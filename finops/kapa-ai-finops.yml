meters:
- name: platform_subscription
  description: Annual platform fee for the kapa.ai subscription.
  unit: contract
  aggregation: sum
  dimensions:
  - account
- name: questions
  description: Questions/answers served against the contracted monthly volume.
  unit: questions
  aggregation: sum
  dimensions:
  - account
  - project
  - integration
- name: question_overage
  description: Questions served beyond the contracted monthly volume, billed as overage.
  unit: questions
  aggregation: sum
  dimensions:
  - account
  - project
- name: knowledge_bases
  description: Number of projects / knowledge bases ingested and licensed.
  unit: projects
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Use the Analytics API (activity, question-answers, top questions) to track question volume per project and integration.
- name: Allocation
  description: Pass integration_id and end-user identifiers on each call to attribute usage to teams, products, and surfaces.
- name: Optimization
  description: Improve answer coverage to reduce repeated questions; consolidate knowledge bases; monitor coverage gaps to cut deflection cost.
- name: Accountability
  description: Assign owners per project; review monthly question burn against the contracted volume to avoid overage.
