description: >-
  FinOps view of kapa.ai spend. kapa.ai is sold sales-led as an annual platform
  subscription plus a licensed volume of questions/answers per month, with
  overage charges beyond the contracted volume. Cost is driven by question
  volume across the website widget, in-app assistant, bots, and the Query API,
  scaled by number of knowledge bases and support level. There is no public
  per-token or per-call rate card, so meters below are representative and not
  reconciled.
notes: >-
  Per-contract platform fees, included question volume, and overage rates are
  negotiated and not public; verify against the order form during
  reconciliation.
